name: CI with Nx

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test (Nx Affected)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      # Determines the base/head commits so Nx can compute affected projects
      - name: Set Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Show affected projects
        run: npx nx show projects --affected

      - name: Run affected lint
        run: npx nx affected -t lint

      - name: Run affected tests
        run: npx nx affected -t test || echo "No affected tests found."

      - name: Run affected builds
        run: npx nx affected -t build

  security-scans:
    name: Security Scans
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, csharp

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node Dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Run NPM Audit
        run: npm audit --audit-level=high || echo "Vulnerabilities found."

      # Required by CodeQL for C#
      - name: Build .NET Solution
        run: dotnet build backend/EnterprisePortal.slnx

      - name: Check .NET Package Vulnerabilities
        run: dotnet list backend/EnterprisePortal.slnx package --vulnerable || echo "Vulnerabilities found."

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3