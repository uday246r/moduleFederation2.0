name: CI with Nx

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test (Nx)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Nx affected

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install dependencies
        # Rollup cross-platform optional dependency bug workaround:
        run: |
          rm -f package-lock.json
          npm install

      - name: Run .NET Tests
        run: dotnet test backend/EnterprisePortal.slnx --logger trx || echo "No tests found or tests failed"

      - name: Build .NET Backend
        run: dotnet build backend/EnterprisePortal.slnx

      - name: Set Nx SHAs for Affected Commands
        uses: nrwl/nx-set-shas@v4

      - name: Run Nx Tests
        # Only run tests for affected projects
        run: npx nx affected -t test || echo "No tests found or tests failed"

      - name: Run Nx Build
        # Only build affected projects
        run: npx nx affected -t build

  security-scans:
    name: Security Scans
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, csharp

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Run NPM Audit
        # Check for vulnerabilities but don't fail the build immediately while onboarding
        run: npm audit --audit-level=high || echo "Vulnerabilities found."

      - name: Run .NET Build (Required for CodeQL C# analysis)
        run: dotnet build backend/EnterprisePortal.slnx

      - name: Run .NET Vulnerability Check
        run: dotnet list backend/EnterprisePortal.slnx package --vulnerable || echo "Vulnerabilities found."

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
