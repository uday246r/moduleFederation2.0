version: "3.9"

services:
  # ==========================================
  # Database Container (Shared by all APIs)
  # ==========================================
  # postgres-db:
  #   image: postgres:17-alpine
  #   container_name: postgres-db
  #   restart: always
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-postgres}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  #     POSTGRES_DB: ${POSTGRES_DB:-employeeManagement}
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-db-data:/var/lib/postgresql/data
  #     - ./postgres-init:/docker-entrypoint-initdb.d:ro

  # ==========================================
  # Backend API Services
  # ==========================================
  auth-api:
    build:
      context: ./backend/AuthService
      dockerfile: Dockerfile
    container_name: auth-api
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=ep-young-hat-apvqgmun.c-7.us-east-1.aws.neon.tech;Port=5432;Database=authService;Username=neondb_owner;Password=npg_9rmtwPbaCF1G; SSL Mode=Require;Trust Server Certificate=true
    ports:
      - "5005:8080"
    # depends_on:
    #   - postgres-db

  employee-api:
    build:
      context: ./backend/EmployeeService
      dockerfile: Dockerfile
    container_name: employee-api
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AuthApiUrl: http://auth-api:8080
      ConnectionStrings__DefaultConnection: Host=ep-lively-sunset-applrdrk.c-7.us-east-1.aws.neon.tech;Port=5432;Database=employeeManagement;Username=neondb_owner;Password=npg_Teco3MhA7UbE;SSL Mode=Require;Trust Server Certificate=true
    ports:
      - "8081:8081"
    # depends_on:
    #   - postgres-db

  asset-api:
    build:
      context: ./backend/AssetService
      dockerfile: Dockerfile
    container_name: asset-api
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AuthApiUrl: http://auth-api:8080
      ConnectionStrings__DefaultConnection: Host=ep-purple-boat-ah63t0v8-pooler.c-3.us-east-1.aws.neon.tech;Port=5432;Database=neondb;Username=neondb_owner;Password=npg_n5tFelTCX4Do;SSL Mode=Require;Trust Server Certificate=true
    ports:
      - "5088:10000"
    # depends_on:
    #   - postgres-db

  helpdesk-api:
    build:
      context: ./backend/HelpDeskService
      dockerfile: Containerfile
    container_name: helpdesk-api
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AuthApiUrl: http://auth-api:8080
      ConnectionStrings__DefaultConnection: Host=ep-quiet-butterfly-atwzo5pp.c-9.us-east-1.aws.neon.tech;Port=5432;Database=helpdeskService;Username=neondb_owner;Password=npg_1icBlxKRXt9b;SSL Mode=Require;Trust Server Certificate=true
      ApplyMigrationsOnStartup: "true"
    ports:
      - "5007:8080"
    # depends_on:
    #   - postgres-db

  inventory-api:
    build:
      context: ./backend/InventoryService/Inventory.API
      dockerfile: Containerfile
    container_name: inventory-api
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=ep-gentle-pine-aibejfz2-pooler.c-4.us-east-1.aws.neon.tech;Port=5432;Database=neondb;Username=neondb_owner;Password=npg_GRwZlaCd64rP;SSL Mode=Require;Trust Server Certificate=true
    ports:
      - "5267:8080"
    # depends_on:
    #   - postgres-db

  # ==========================================
  # Frontend Micro-Frontend Services
  # ==========================================
  host-app:
    build:
      context: ./host-app
      dockerfile: Dockerfile
      args:
        - VITE_EMPLOYEE_MF_URL=${VITE_EMPLOYEE_MF_URL:-http://${HOST_IP:-localhost}:5001/mf-manifest.json}
        - VITE_ASSET_MF_URL=${VITE_ASSET_MF_URL:-http://${HOST_IP:-localhost}:5003/mf-manifest.json}
        - VITE_HELPDESK_MF_URL=${VITE_HELPDESK_MF_URL:-http://${HOST_IP:-localhost}:5004/mf-manifest.json}
        - VITE_INVENTORY_MF_URL=${VITE_INVENTORY_MF_URL:-http://${HOST_IP:-localhost}:5002/mf-manifest.json}
        - VITE_AUTH_API=${VITE_AUTH_API:-http://${HOST_IP:-localhost}:5005}
    container_name: host-app
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - employee-mf
      - asset-mf
      - helpdesk-mf
      - inventory-mf
      - auth-api

  employee-mf:
    build:
      context: ./federations/employee_mf
      dockerfile: Dockerfile
      args:
        - VITE_EMPLOYEE_API=${VITE_EMPLOYEE_API:-http://${HOST_IP:-localhost}:8081/api}
        - VITE_AUTH_API=${VITE_AUTH_API:-http://${HOST_IP:-localhost}:5005}
    container_name: employee-mf
    restart: always
    ports:
      - "5001:80"

  inventory-mf:
    build:
      context: ./federations/inventory_mf
      dockerfile: Containerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://${HOST_IP:-localhost}:5267/api}
    container_name: inventory-mf
    restart: always
    ports:
      - "5002:80"

  asset-mf:
    build:
      context: ./federations/asset_mf
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://${HOST_IP:-localhost}:5088/api}
    container_name: asset-mf
    restart: always
    ports:
      - "5003:80"

  helpdesk-mf:
    build:
      context: ./federations/helpdesk_mf
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://${HOST_IP:-localhost}:5007/api}
        - VITE_AUTH_API=${VITE_AUTH_API:-http://${HOST_IP:-localhost}:5005/api}
    container_name: helpdesk-mf
    restart: always
    ports:
      - "5004:80"

# volumes:
